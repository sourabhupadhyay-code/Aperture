# Nginx server block for the static site.
# On the EC2 instance this is installed to /etc/nginx/sites-available/website.conf
# and symlinked into /etc/nginx/sites-enabled/

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    root /var/www/aperture-roasters;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets aggressively; HTML is left uncached so deploys show up immediately.
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
}
